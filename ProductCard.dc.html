<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; background:#fff; border:1px solid rgba(106,78,47,.09); border-radius:20px; overflow:hidden; cursor:pointer; transition:transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s;" style-hover="transform:translateY(-8px); box-shadow:0 30px 60px rgba(106,78,47,.18);" onClick="{{ p.onOpen }}">
  <div style="position:relative; aspect-ratio:1; background:#F5EFE2; overflow:hidden;">
    <image-slot id="{{ p.slot }}" shape="rect" placeholder="{{ p.name }}"></image-slot>
    <div style="position:absolute; top:12px; left:12px; display:flex; flex-direction:column; gap:6px; pointer-events:none;">
      <sc-if value="{{ p.hasDisc }}" hint-placeholder-val="{{ true }}">
        <span style="background:#EA4335; color:#fff; font-family:Montserrat,sans-serif; font-weight:700; font-size:11px; padding:4px 9px; border-radius:100px;">{{ p.discLabel }}</span>
      </sc-if>
      <sc-if value="{{ p.badgeShow }}" hint-placeholder-val="{{ true }}">
        <span style="background:#1A1A1A; color:#D4AF37; font-family:Montserrat,sans-serif; font-weight:700; font-size:10px; letter-spacing:.08em; padding:4px 9px; border-radius:100px;">{{ p.badge }}</span>
      </sc-if>
    </div>
    <button onClick="{{ p.onWish }}" title="Wishlist" style="position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.92); border:none; cursor:pointer; font-size:16px; color:#EA4335; display:grid; place-items:center; box-shadow:0 4px 12px rgba(0,0,0,.12);">{{ p.wishGlyph }}</button>
    <div style="position:absolute; left:12px; right:12px; bottom:12px; display:flex; gap:8px; opacity:0; transform:translateY(10px); transition:.3s;" style-hover="opacity:1; transform:translateY(0);">
      <button onClick="{{ p.onQuick }}" style="flex:1; background:rgba(255,255,255,.95); backdrop-filter:blur(6px); border:none; border-radius:100px; padding:10px; font-family:Montserrat,sans-serif; font-weight:600; font-size:12px; color:#6A4E2F; cursor:pointer;">Quick View</button>
    </div>
  </div>
  <div style="padding:18px 18px 20px;">
    <sc-if value="{{ p.organicShow }}" hint-placeholder-val="{{ true }}">
      <span style="display:inline-block; font-family:Montserrat,sans-serif; font-size:9.5px; font-weight:700; letter-spacing:.1em; color:#8BC34A; margin-bottom:6px;">🌿 CERTIFIED ORGANIC</span>
    </sc-if>
    <h3 style="font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:#2a1f12; line-height:1.25; min-height:44px;">{{ p.name }}</h3>
    <div style="display:flex; align-items:center; gap:6px; margin-top:6px;">
      <span style="color:#D4AF37; font-size:13px; letter-spacing:1px;">{{ p.starStr }}</span>
      <span style="color:#8a7a63; font-size:12px;">{{ p.reviewStr }}</span>
      <span style="color:#c8bba2; font-size:12px;">· {{ p.weight }}</span>
    </div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:14px;">
      <div style="display:flex; align-items:baseline; gap:8px;">
        <span style="font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:#6A4E2F;">{{ p.priceDisplay }}</span>
        <span style="text-decoration:line-through; color:#b0a288; font-size:13px;">{{ p.oldDisplay }}</span>
      </div>
      <button onClick="{{ p.onAdd }}" title="Add to cart" style="width:44px; height:44px; border-radius:50%; background:#6A4E2F; color:#fff; border:none; cursor:pointer; font-size:20px; display:grid; place-items:center; transition:transform .2s, background .2s;" style-hover="transform:scale(1.08); background:#553d22;">+</button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;280&quot;,&quot;height&quot;:&quot;420&quot;},&quot;p&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
